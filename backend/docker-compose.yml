version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ewms_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ewms_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://ewms_user:password@db:5432/ewms_dev
      ENVIRONMENT: development
    depends_on:
      - db
    volumes:
      - .:/app

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: npm run dev
    ports:
      - '3000:3000'
    volumes:
      - ../frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
